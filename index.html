<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport is key for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon-16x16.png">
  <title>Welcome to Town Gwiss</title>
   <link rel="stylesheet" href="./register.css">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/6.6.6/css/flag-icons.min.css">
</head>
<body>
  <div class="authentication-wrapper">
    <div class="authentication-inner">
      <!-- LEFT DYNAMIC BACKGROUND (rotating images) -->
      <div class="left-image" id="random-image" style="background-image: url('https://static-gcp.freepikcompany.com/web-app/media/freepik-1-2000.webp')"></div>

      <!-- RIGHT REGISTER FORM (mobile optimized) -->
      <div class="register-sect">
        <div class="w-px-400">
          <!-- Logo -->
          <div class="app-brand">
            <a href="https://www.TownGwiss.com" class="app-brand-link">
              <img src="img/logo.png" alt="Town.Gwiss" style="max-width:70%; height:auto;">
            </a>
          </div>

          <h4>Book your place & be part 🚀</h4>

          <form id="signupForm" action="https://formsubmit.co/0dac10d8b3a7275d636fbae4f67b8354" method="POST">
            <!-- formsubmit config -->
            <input type="hidden" name="_next" value="https://www.towngwiss.com/welcome.html">
            <input type="hidden" name="_subject" value="New Registration - Town Gwiss">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_honey" style="display:none">

            <!-- Name -->
            <div class="mb-3">
              <label for="name" class="form-label">Full name</label>
              <input type="text" id="name" name="name" placeholder="e.g., Sarah Kyomugisha" class="form-control" required>
            </div>

            <!-- WhatsApp with UG prefix (mobile friendly) -->
            <div class="mb-3">
              <label for="phone" class="form-label">WhatsApp number</label>
              <div class="phone-prefix">
                <span>+256</span>
                <input type="tel" id="phone" name="phone" placeholder="70X XXX XXX" class="form-control" required>
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" class="form-control" required>
            </div>
            <hr>
            <p class="mt-4 mb-4">
              <span class="bg-soft">For Exclusive membership benefits</span>
            </p>

            <button type="submit" class="btn-primary">Continue</button>
          </form>

          <!-- hidden remember-me checkbox for cookie logic (not visible) -->
          <div class="remember-hidden">
            <input type="checkbox" id="remember-me" checked>
          </div>
        </div>
      </div>
    </div>
  </div>

 <!-- scripts (jQuery, form handling, cookie, rotation) – all mobile compatible -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      // ------------------ IMAGE ROTATION ------------------
      const photos = [
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-3-2000.webp",
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-11-2000.webp",
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-18-2000.webp",
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-23-2000.webp",
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-25-2000.webp",
        "https://static-gcp.freepikcompany.com/web-app/media/freepik-27-2000.webp"
      ];

      const leftDiv = document.getElementById('random-image');

      function changeLeftImage() {
        if (!leftDiv) return;
        const randomIndex = Math.floor(Math.random() * photos.length);
        leftDiv.style.backgroundImage = `url('${photos[randomIndex]}')`;
      }

      changeLeftImage();
      setInterval(changeLeftImage, 25000);

      // ------------------ COOKIE FUNCTIONS ------------------
      function createCookie(name, value, days) {
        let expires = "";
        if (days) {
          const date = new Date();
          date.setTime(date.getTime() + (days * 86400000));
          expires = "; expires=" + date.toUTCString();
        }
        document.cookie = encodeURIComponent(name) + "=" + encodeURIComponent(value) + expires + "; path=/";
      }

      function readCookie(name) {
        const nameEQ = encodeURIComponent(name) + "=";
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
          c = c.trim();
          if (c.indexOf(nameEQ) === 0) {
            return decodeURIComponent(c.substring(nameEQ.length));
          }
        }
        return null;
      }

      function eraseCookie(name) {
        createCookie(name, "", -1);
      }

      const emailInput = document.getElementById('email');
      const rememberCheckbox = document.getElementById('remember-me');

      if (readCookie('userLoginID') && emailInput) {
        emailInput.value = readCookie('userLoginID');
        if (rememberCheckbox) rememberCheckbox.checked = true;
      }

      if (emailInput) {
        emailInput.addEventListener('input', function () {
          if (rememberCheckbox && rememberCheckbox.checked) {
            createCookie('userLoginID', emailInput.value, 9999);
          }
        });
      }

      if (rememberCheckbox) {
        rememberCheckbox.addEventListener('change', function () {
          if (this.checked) {
            createCookie('userLoginID', emailInput.value, 9999);
          } else {
            eraseCookie('userLoginID');
          }
        });
      }

      // ------------------ PHONE DIGITS ONLY ------------------
      const phoneInput = document.getElementById('phone');
      if (phoneInput) {
        phoneInput.addEventListener('input', function () {
          this.value = this.value.replace(/\D/g, '');
        });
      }

      // ------------------ FORM SUBMIT ------------------
      const form = document.getElementById('signupForm');

      if (!form) return;

      form.addEventListener('submit', function (e) {

        const name = document.getElementById('name').value.trim();
        const phone = phoneInput.value.trim();
        const email = emailInput.value.trim();

        // Validation
        if (!name) {
          alert('Please enter your name');
          e.preventDefault();
          return;
        }

        if (!phone) {
          alert('Please enter your WhatsApp number');
          e.preventDefault();
          return;
        }

        if (!email) {
          alert('Please enter your email');
          e.preventDefault();
          return;
        }

        // Save name for welcome page
        localStorage.setItem('userName', name);

        // Format phone correctly
        const digitsOnly = phone.replace(/\D/g, '');
        phoneInput.value = '+256' + digitsOnly;

        // Allow normal form submission (NO fetch)
      });

    });
  </script>
</body>     
</html>
